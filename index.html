<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Appliance Package Builder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#1D9E75;--accent-light:#E1F5EE;--accent-dark:#0F6E56;
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f2ef;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0e0da;--border2:#c8c8c2;
  --radius:8px;--radius-lg:12px;
  --danger:#E24B4A;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg3);min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;background:var(--bg);border-left:0.5px solid var(--border);border-right:0.5px solid var(--border)}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{color:#fff}
.logo-text{font-size:15px;font-weight:500;color:var(--text)}
.stepper{display:flex;align-items:center;padding:0 24px;border-bottom:0.5px solid var(--border);overflow-x:auto;background:var(--bg2)}
.step{display:flex;align-items:center;flex-shrink:0}
.step-btn{display:flex;align-items:center;gap:7px;padding:11px 10px;font-size:12px;color:var(--text3);border:none;background:none;cursor:default;white-space:nowrap;font-family:inherit}
.step-btn.active{color:var(--accent);font-weight:500}
.step-btn.done{color:var(--text2);cursor:pointer}
.step-dot{width:20px;height:20px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--text3);flex-shrink:0}
.step-btn.active .step-dot{background:var(--accent);color:#fff}
.step-btn.done .step-dot{background:var(--accent);color:#fff}
.step-sep{width:16px;height:0.5px;background:var(--border);flex-shrink:0}
.progress-bar{height:3px;background:var(--border)}
.progress-fill{height:100%;background:var(--accent);transition:width .4s}
.content{flex:1;padding:32px 24px 140px;max-width:720px;width:100%;margin:0 auto}
.section-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:6px}
.section-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.fg{margin-bottom:20px}
.fl{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;gap:4px}
.req{color:var(--danger)}
input[type=text],input[type=email],input[type=tel],select,textarea{width:100%;height:38px;border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 12px;font-size:14px;color:var(--text);background:var(--bg);font-family:inherit;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(29,158,117,.12)}
textarea{height:80px;padding:10px 12px;resize:vertical;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.err{font-size:12px;color:var(--danger);margin-top:5px}
.chip-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.chip{padding:7px 14px;border:0.5px solid var(--border2);border-radius:999px;font-size:13px;color:var(--text2);cursor:pointer;background:var(--bg);user-select:none;transition:all .13s}
.chip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:hover:not(.sel){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ── Room cards ─────────────────────────────────────── */
.room-row{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.room-card{border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;background:var(--bg);flex:1;min-width:180px}
.room-card.sel{border-color:var(--accent);background:var(--accent-light);border-width:1.5px}
.room-card-ico{width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2)}
.room-card.sel .room-card-ico{background:rgba(29,158,117,.12);color:var(--accent-dark)}
.room-card-name{font-size:14px;font-weight:500;color:var(--text)}
.room-card-desc{font-size:12px;color:var(--text3);margin-top:2px}

/* ── Appliance cards ────────────────────────────────── */
.app-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-top:8px}
.app-card{border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 12px 14px;cursor:pointer;background:var(--bg);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .17s;position:relative}
.app-card:hover{border-color:var(--accent);background:var(--accent-light);transform:translateY(-1px)}
.app-card.sel{border-color:var(--accent);background:var(--accent-light);border-width:1.5px;transform:translateY(-1px)}
.app-card-svg{width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;color:var(--text3)}
.app-card.sel .app-card-svg{color:var(--accent-dark)}
.app-card-svg svg{width:100%;height:100%}
.app-card-name{font-size:13px;font-weight:500;color:var(--text)}
.app-card.sel .app-card-name{color:var(--accent-dark)}
.app-card-desc{font-size:11px;color:var(--text3);line-height:1.4}
.app-card.sel .app-card-desc{color:var(--accent)}
.check-badge{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.app-card.sel .check-badge{opacity:1}

/* ── Appliance detail sections ──────────────────────── */
.appl-section{border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden}
.appl-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border)}
.appl-hdr-ico{width:26px;height:26px;flex-shrink:0;color:var(--accent)}
.appl-hdr-ico svg{width:100%;height:100%}
.appl-hdr-name{font-size:14px;font-weight:500;color:var(--text)}
.appl-body{padding:16px}
.sm-chip{padding:5px 11px;font-size:12px}

/* ── Budget tabs ────────────────────────────────────── */
.budget-tabs{display:flex;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:20px}
.budget-tab{padding:8px 22px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;background:var(--bg);border:none;font-family:inherit;transition:all .15s}
.budget-tab.active{background:var(--accent);color:#fff}
.budget-tab:not(:last-child){border-right:0.5px solid var(--border2)}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.budget-card{border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;background:var(--bg);transition:all .15s}
.budget-card:hover{border-color:var(--accent);background:var(--accent-light)}
.budget-card.sel{border-color:var(--accent);background:var(--accent-light);border-width:1.5px}
.budget-hdr{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.budget-emoji{width:28px;height:28px;border-radius:6px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.budget-card.sel .budget-emoji{background:rgba(29,158,117,.12)}
.budget-label{font-size:13px;font-weight:500;color:var(--text)}
.budget-tip{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:5px}
.budget-badge{font-size:10px;font-weight:500;color:var(--accent-dark);background:var(--accent-light);padding:2px 8px;border-radius:999px;display:inline-block}
.budget-card.sel .budget-badge{background:rgba(29,158,117,.18)}

/* per-appliance budget rows */
.pa-rows{border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:4px 16px;margin-bottom:20px}
.pa-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.pa-row:last-child{border-bottom:none}
.pa-ico{width:30px;height:30px;border-radius:8px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
.pa-ico svg{width:18px;height:18px}
.pa-name{font-size:13px;font-weight:500;color:var(--text);min-width:110px}
.pa-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.pa-chip{padding:4px 10px;border:0.5px solid var(--border2);border-radius:999px;font-size:11px;color:var(--text2);cursor:pointer;background:var(--bg);transition:all .12s}
.pa-chip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}

/* summary & consent */
.divider{height:0.5px;background:var(--border);margin:24px 0}
.sum-card{border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;background:var(--bg2)}
.sum-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:13px}
.sum-key{color:var(--text2)}
.sum-val{color:var(--text);font-weight:500;text-align:right;max-width:60%}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;background:var(--accent-light);color:var(--accent-dark);margin:2px}
.consent-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;padding:14px;border:0.5px solid var(--border);border-radius:var(--radius);background:var(--bg2)}
.consent-cb{margin-top:2px;accent-color:var(--accent);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.consent-text{font-size:13px;color:var(--text2);line-height:1.5}

/* bottom bar */
.bottombar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:900px;background:var(--bg);border-top:0.5px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;z-index:99}
.btn-back{padding:9px 20px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text2);background:transparent;cursor:pointer;font-family:inherit}
.btn-back:hover{background:var(--bg2)}
.btn-cont{padding:9px 28px;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;color:#fff;background:var(--accent);cursor:pointer;font-family:inherit}
.btn-cont:hover{background:var(--accent-dark)}

/* success */
.success-screen{display:flex;flex-direction:column;align-items:center;padding:60px 24px;text-align:center;gap:16px}
.success-ico{width:64px;height:64px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--accent-dark)}
</style>
</head>

// ─── DOM helpers ──────────────────────────────────────────────────────────
function mk(tag,cls,html){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(typeof html==='string')e.innerHTML=html;
  return e;
}
const div=(cls,html)=>mk('div',cls,html);
const span=(cls,t)=>{const e=mk('span',cls);e.textContent=t;return e;};
const inp=(type,val,ph,onInput)=>{const e=mk('input');e.type=type;e.value=val||'';e.placeholder=ph||'';e.addEventListener('input',ev=>onInput(ev.target.value));return e;};
const sel=(val,opts,onChange)=>{const e=mk('select');e.appendChild(Object.assign(mk('option'),'',{value:''}));opts.forEach(o=>{const op=mk('option');op.value=o.v;op.textContent=o.l;if(val===o.v)op.selected=true;e.appendChild(op);});e.addEventListener('change',ev=>onChange(ev.target.value));return e;};
function svgDiv(cls,svgStr,sz){const d=mk('div',cls);d.innerHTML=svgStr;const s=d.querySelector('svg');if(s&&sz){s.style.width=sz;s.style.height=sz;}return d;}
function errEl(k){if(!S.errors[k])return null;const e=mk('div','err');e.textContent=S.errors[k];return e;}
function app(c,...nodes){nodes.forEach(n=>n&&c.appendChild(n));return c;}

function fg(label,req,...nodes){
  const g=mk('div','fg');
  const lbl=mk('div','fl'); lbl.textContent=label;
  if(req){const r=mk('span','req');r.textContent='*';lbl.appendChild(r);}
  g.appendChild(lbl); nodes.forEach(n=>n&&g.appendChild(n)); return g;
}

function chips(key,opts,multi=false){
  const g=mk('div','chip-grid');
  opts.forEach(o=>{
    const isSel=multi?(S[key]||[]).includes(o.v):S[key]===o.v;
    const c=mk('div','chip'+(isSel?' sel':''));c.textContent=o.l;
    c.addEventListener('click',()=>{
      if(multi){const a=[...(S[key]||[])];const i=a.indexOf(o.v);i>=0?a.splice(i,1):a.push(o.v);S[key]=a;}
      else{S[key]=S[key]===o.v?'':o.v;}
      delete S.errors[key];render();
    });
    g.appendChild(c);
  });
  return g;
}

function detChips(ak,field,opts,multi=false){
  if(!S.det[ak])S.det[ak]={};
  const g=mk('div','chip-grid');
  opts.forEach(o=>{
    const d=S.det[ak]||{};
    const isSel=multi?(d[field]||[]).includes(o.v):d[field]===o.v;
    const c=mk('div','chip sm-chip'+(isSel?' sel':''));c.textContent=o.l;
    c.addEventListener('click',()=>{
      if(!S.det[ak])S.det[ak]={};
      if(multi){const a=[...(S.det[ak][field]||[])];const i=a.indexOf(o.v);i>=0?a.splice(i,1):a.push(o.v);S.det[ak][field]=a;}
      else{S.det[ak][field]=S.det[ak][field]===o.v?'':o.v;}
      render();
    });
    g.appendChild(c);
  });
  return g;
}

function detQ(ak,field,label,opts,multi=false){
  const g=mk('div','fg');g.style.marginBottom='10px';
  const lbl=mk('div','fl');lbl.style.cssText='font-size:12px;margin-bottom:5px';lbl.textContent=label;
  g.appendChild(lbl);g.appendChild(detChips(ak,field,opts,multi));return g;
}

// ─── Render ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';root.appendChild(buildApp());
}

function validate(step){
  const e={};
  if(step===0){
    if(!S.first_name.trim())e.first_name='Required';
    if(!S.last_name.trim())e.last_name='Required';
    if(!S.email.includes('@'))e.email='Valid email required';
    if(!S.phone.trim())e.phone='Required';
    if(!S.city.trim())e.city='Required';
    if(!S.preferred_contact)e.preferred_contact='Please select one';
    if(!S.lead_source)e.lead_source='Please select one';
  } else if(step===1){
    if(!S.project_type)e.project_type='Please select one';
    if(!S.occupancy_type)e.occupancy_type='Please select one';
    if(!S.timeline)e.timeline='Please select one';
    if(!S.priority_primary)e.priority_primary='Please select one';
  } else if(step===2){
    if(!S.room_scope.length)e.room_scope='Select at least one room';
    if(!S.selected_appliances.length)e.selected_appliances='Select at least one appliance';
  } else if(step===4){
    if(S.budget_mode==='bundle'&&!S.budget_range)e.budget_range='Please select a budget range';
  } else if(step===5){
    if(!S.consent_contact)e.consent_contact='Contact consent is required';
    if(!S.consent_summary)e.consent_summary='Please confirm the summary is accurate';
  }
  return e;
}

// ── Google Sheets endpoint ────────────────────────────────────────────────
const SHEETS_URL='https://script.google.com/macros/s/AKfycbxt5IaZ5L_2qr2xd3KBeLXI2_5PPCOpNDWHHEhC2MTS7ugfWrqPoI7pndzdnwXFp0WV4g/exec';

async function submitToSheets(){
  // Disable button and show loading state
  const btn=document.querySelector('.btn-cont');
  if(btn){btn.textContent='Saving…';btn.disabled=true;btn.style.opacity='0.7';}

  const payload={
    timestamp: new Date().toISOString(),
    first_name:S.first_name, last_name:S.last_name,
    email:S.email, phone:S.phone,
    city:S.city, province:S.province, postal_code:S.postal_code,
    preferred_contact:S.preferred_contact, lead_source:S.lead_source,
    project_type:S.project_type, occupancy_type:S.occupancy_type,
    timeline:S.timeline, priority_primary:S.priority_primary,
    room_scope:(S.room_scope||[]).join(', '),
    selected_appliances:(S.selected_appliances||[]).join(', '),
    appliance_details:JSON.stringify(S.det||{}),
    measurements_ready:S.measurements_ready,
    delivery_stairs:S.delivery_stairs,
    delivery_remove_old:S.delivery_remove_old,
    delivery_installation:S.delivery_installation,
    budget_mode:S.budget_mode,
    budget_range:S.budget_mode==='bundle'?S.budget_range:JSON.stringify(S.appl_budgets||{}),
    colour_preference:S.colour_preference,
    promo_interest:S.promo_interest,
    brand_flexible:S.brand_flexible,
    open_box_ok:S.open_box_ok,
    customer_notes:S.customer_notes,
  };

  try {
    await fetch(SHEETS_URL,{
      method:'POST',
      mode:'no-cors', // required for Apps Script — response will be opaque but data saves
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
    // no-cors means we can't read the response status,
    // but if fetch didn't throw the request reached Google
    S.submitted=true;
    render();
  } catch(err){
    if(btn){btn.textContent='Save profile';btn.disabled=false;btn.style.opacity='1';}
    // Show inline error instead of alert
    S.submitError=true;
    render();
  }
}

function goNext(){
  const errs=validate(S.step);
  if(Object.keys(errs).length){S.errors=errs;render();window.scrollTo(0,0);return;}
  if(S.step===STEPS.length-1){submitToSheets();return;}
  S.step++;S.errors={};render();window.scrollTo(0,0);
}

function buildApp(){
  const wrap=mk('div','app');

  // topbar
  const tb=mk('div','topbar');
  const li=mk('div','logo-icon');li.innerHTML='<svg width="16" height="16" fill="#fff" viewBox="0 0 24 24"><path d="M3 6a3 3 0 013-3h12a3 3 0 013 3v2a3 3 0 01-3 3H6a3 3 0 01-3-3V6zm0 10a3 3 0 013-3h12a3 3 0 013 3v2a3 3 0 01-3 3H6a3 3 0 01-3-3v-2z"/></svg>';
  const lt=mk('span','logo-text');lt.textContent='Appliance Package Builder';
  app(tb,li,lt);wrap.appendChild(tb);

  // progress
  const pb=mk('div','progress-bar');const pf=mk('div','progress-fill');pf.style.width=(S.step/(STEPS.length-1)*100)+'%';pb.appendChild(pf);wrap.appendChild(pb);

  // stepper
  const st=mk('div','stepper');
  STEPS.forEach((s,i)=>{
    if(i>0){const sep=mk('div','step-sep');st.appendChild(sep);}
    const cls=i<S.step?'done':i===S.step?'active':'';
    const dot=mk('div','step-dot');dot.textContent=i<S.step?'✓':String(i+1);
    const b=mk('button','step-btn '+cls);b.appendChild(dot);b.appendChild(document.createTextNode(s.l));
    if(i<S.step)b.addEventListener('click',()=>{S.step=i;S.errors={};render();});
    const sw=mk('div','step');sw.appendChild(b);st.appendChild(sw);
  });
  wrap.appendChild(st);

  if(S.submitted){wrap.appendChild(buildSuccess());return wrap;}

  const cnt=mk('div','content');cnt.appendChild([step0,step1,step2,step3,step4,step5][S.step]());wrap.appendChild(cnt);

  const bar=mk('div','bottombar');
  const bk=mk('button','btn-back');bk.textContent='Back';bk.style.visibility=S.step===0?'hidden':'visible';bk.addEventListener('click',()=>{if(S.step>0){S.step--;S.errors={};render();window.scrollTo(0,0);}});
  const sl=mk('span','');sl.style.cssText='font-size:12px;color:var(--text3)';sl.textContent=`Step ${S.step+1} of ${STEPS.length}`;
  const co=mk('button','btn-cont');co.textContent=S.step===STEPS.length-1?'Save profile':'Continue →';co.addEventListener('click',goNext);
  app(bar,bk,sl,co);wrap.appendChild(bar);
  return wrap;
}

    const hico=mk('div','appl-hdr-ico');hico.innerHTML=ICONS[k]||'';const hsvg=hico.querySelector('svg');if(hsvg){hsvg.style.width='24px';hsvg.style.height='24px';}
    const hn=mk('div','appl-hdr-name');hn.textContent=meta.l;
    hdr.appendChild(hico);hdr.appendChild(hn);
    const body=mk('div','appl-body');
    (DEFS[k]||[]).forEach(q=>body.appendChild(detQ(k,q.f,q.l,q.o,q.multi||false)));
    sec.appendChild(hdr);sec.appendChild(body);c.appendChild(sec);
  });

  const dv=mk('div','divider');c.appendChild(dv);
  const t2=mk('div','section-title');t2.style.cssText='font-size:16px;margin-bottom:14px';t2.textContent='Measurements & delivery';c.appendChild(t2);
  c.appendChild(fg('Can you provide measurements?',false,chips('measurements_ready',[{v:'yes',l:'Yes'},{v:'no',l:'No'},{v:'photo_upload',l:"I'll upload photos"},{v:'need_help',l:'Need help'}])));
  c.appendChild(fg('Stairs at delivery location?',false,chips('delivery_stairs',[{v:'none',l:'None'},{v:'few_steps',l:'A few steps'},{v:'one_flight',l:'One flight'},{v:'multiple_flights',l:'Multiple flights'},{v:'not_sure',l:'Not sure'}])));
  c.appendChild(fg('Need old appliance removal?',false,chips('delivery_remove_old',[{v:'yes',l:'Yes'},{v:'no',l:'No'},{v:'maybe',l:'Maybe'}])));
  c.appendChild(fg('Need installation?',false,chips('delivery_installation',[{v:'yes',l:'Yes'},{v:'no',l:'No'},{v:'maybe',l:'Maybe'},{v:'not_sure',l:'Not sure'}])));
  return c;
}

function step4(){
  const c=mk('div','');
  const t=mk('div','section-title');t.textContent='Budget';c.appendChild(t);
  const s=mk('div','section-sub');s.textContent="Set a budget per appliance, or give us a total package range — whichever's easier.";c.appendChild(s);

  // mode tabs
  const tabs=mk('div','budget-tabs');
  [{v:'per_appliance',l:'Per appliance'},{v:'bundle',l:'Total package'}].forEach(m=>{
    const tb=mk('button','budget-tab'+(S.budget_mode===m.v?' active':''));tb.textContent=m.l;
    tb.addEventListener('click',()=>{S.budget_mode=m.v;delete S.errors.budget_range;render();});
    tabs.appendChild(tb);
  });
  c.appendChild(tabs);

  if(S.budget_mode==='per_appliance'){
    const note=mk('div','');note.style.cssText='font-size:13px;color:var(--text2);margin-bottom:14px';note.textContent="Set a budget for each appliance you've selected. Leave \"Not sure\" if you're flexible on any.";c.appendChild(note);
    const rows=mk('div','pa-rows');
    const applList=S.selected_appliances.length?S.selected_appliances:APPLIANCES.map(a=>a.k);
    applList.forEach(k=>{
      const meta=APPLIANCES.find(a=>a.k===k)||{l:k,k};
      const row=mk('div','pa-row');
      const ico=mk('div','pa-ico');ico.innerHTML=ICONS[k]||'';const isvg=ico.querySelector('svg');if(isvg){isvg.style.width='18px';isvg.style.height='18px';}
      const nm=mk('div','pa-name');nm.textContent=meta.l;
      const chps=mk('div','pa-chips');
      PA_BUDGETS.forEach(b=>{
        const isSel=S.appl_budgets[k]===b.v;
        const ch=mk('div','pa-chip'+(isSel?' sel':''));ch.textContent=b.l;
        ch.addEventListener('click',()=>{S.appl_budgets[k]=S.appl_budgets[k]===b.v?'':b.v;render();});
        chps.appendChild(ch);
      });
      row.appendChild(ico);row.appendChild(nm);row.appendChild(chps);rows.appendChild(row);
    });
    c.appendChild(rows);
  } else {
    const grid=mk('div','budget-grid');
    BUNDLE_BUDGETS.forEach(o=>{
      const card=mk('div','budget-card'+(S.budget_range===o.v?' sel':''));
      const hdr=mk('div','budget-hdr');
      const em=mk('div','budget-emoji');em.textContent=o.emoji;
      const lbl=mk('div','budget-label');lbl.textContent=o.l;
      hdr.appendChild(em);hdr.appendChild(lbl);
      const tip=mk('div','budget-tip');tip.textContent=o.tip;
      const badge=mk('div','budget-badge');badge.textContent=o.badge;
      card.appendChild(hdr);card.appendChild(tip);card.appendChild(badge);
      card.addEventListener('click',()=>{S.budget_range=o.v;delete S.errors.budget_range;render();});
      grid.appendChild(card);
    });
    c.appendChild(grid);
    if(S.errors.budget_range)c.appendChild(errEl('budget_range'));
  }

  c.appendChild(mk('div','divider'));
  c.appendChild(fg('Overall finish preference',false,chips('colour_preference',[{v:'stainless',l:'Stainless'},{v:'black_stainless',l:'Black stainless'},{v:'white',l:'White'},{v:'black',l:'Black'},{v:'mixed',l:'Mixed'},{v:'no_preference',l:'No preference'}])));
  c.appendChild(fg('Interested in promotional packages?',false,chips('promo_interest',[{v:'yes',l:'Yes'},{v:'no',l:'No'},{v:'maybe',l:'Maybe'},{v:'only_if_available',l:'If available'}])));
  c.appendChild(fg('Flexible on brand to save money?',false,chips('brand_flexible',[{v:'yes',l:'Yes'},{v:'no',l:'No'},{v:'maybe',l:'Maybe'}])));
  c.appendChild(fg('Open to clearance / open-box?',false,chips('open_box_ok',[{v:'yes',l:'Yes'},{v:'no',l:'New only'},{v:'depends_condition',l:'Depends on condition'}])));
  const gn=fg('Anything else we should know?',false);
  const ta=mk('textarea','');ta.placeholder='Special requirements, delivery notes, questions...';ta.textContent=S.customer_notes||'';ta.addEventListener('input',e=>S.customer_notes=e.target.value);gn.appendChild(ta);c.appendChild(gn);
  return c;
}

function step5(){
  const c=mk('div','');
  // Show network error banner if a previous submit attempt failed
  if(S.submitError){
    const eb=mk('div','');
    eb.style.cssText='background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#A32D2D;display:flex;align-items:flex-start;gap:10px;';
    eb.innerHTML='<span style="font-size:18px;flex-shrink:0;">⚠️</span><div><strong>Connection issue.</strong> Your profile could not be saved. Please check your internet connection and try again. Your answers are still here.</div>';
    c.appendChild(eb);
    S.submitError=false;
  }
  const t=mk('div','section-title');t.textContent='Review your profile';
  const s=mk('div','section-sub');s.textContent='Confirm everything looks correct before submitting.';
  c.appendChild(t);c.appendChild(s);
  const fmtV=v=>v?(v+'').replace(/_/g,' '):'—';

  function sRow(k,v){const r=mk('div','sum-row');const ke=mk('span','sum-key');ke.textContent=k;const ve=mk('span','sum-val');ve.textContent=v||'—';r.appendChild(ke);r.appendChild(ve);return r;}
  function sCard(title,...rows){const card=mk('div','sum-card');const t=mk('div','sum-title');t.textContent=title;card.appendChild(t);rows.forEach(r=>r&&card.appendChild(r));return card;}

  c.appendChild(sCard('Contact information',sRow('Name',`${S.first_name} ${S.last_name}`),sRow('Email',S.email||'—'),sRow('Phone',S.phone||'—'),sRow('City',`${S.city||'—'} ${S.province||''}`),sRow('Contact via',fmtV(S.preferred_contact)),sRow('Lead source',fmtV(S.lead_source))));
  c.appendChild(sCard('Project details',sRow('Project type',fmtV(S.project_type)),sRow('Use',fmtV(S.occupancy_type)),sRow('Timeline',fmtV(S.timeline)),sRow('Priority',fmtV(S.priority_primary))));

  const ac=mk('div','sum-card');const at=mk('div','sum-title');at.textContent='Appliances selected';ac.appendChild(at);
  const tw=mk('div','');S.selected_appliances.forEach(k=>{const tg=mk('span','tag');tg.textContent=k.replace(/_/g,' ');tw.appendChild(tg);});
  ac.appendChild(tw);c.appendChild(ac);

  const bc=mk('div','sum-card');const bt=mk('div','sum-title');bt.textContent='Budget';bc.appendChild(bt);
  if(S.budget_mode==='bundle'){bc.appendChild(sRow('Package budget',fmtV(S.budget_range)));}
  else{S.selected_appliances.forEach(k=>{const meta=APPLIANCES.find(a=>a.k===k);if(meta)bc.appendChild(sRow(meta.l,fmtV(S.appl_budgets[k]||'not set')));});}
  bc.appendChild(sRow('Finish',fmtV(S.colour_preference)));bc.appendChild(sRow('Promos',fmtV(S.promo_interest)));c.appendChild(bc);

  function conRow(id,sk,ek,html){
    const row=mk('div','consent-row');const cb=mk('input','consent-cb');cb.type='checkbox';cb.id=id;cb.checked=S[sk];cb.addEventListener('change',e=>{S[sk]=e.target.checked;delete S.errors[ek];render();});
    const lbl=mk('label','consent-text');lbl.setAttribute('for',id);lbl.innerHTML=html;
    row.appendChild(cb);row.appendChild(lbl);
    const wrap=mk('div','');wrap.appendChild(row);if(S.errors[ek])wrap.appendChild(errEl(ek));return wrap;
  }
  c.appendChild(conRow('cb-c','consent_contact','consent_contact','<strong>I agree</strong> that your store may contact me by phone, email, text, or WhatsApp to respond to this appliance request and provide a quote.'));
  c.appendChild(conRow('cb-s','consent_summary','consent_summary','I confirm the information above is accurate.'));
  const disc=mk('div','');disc.style.cssText='font-size:11px;color:var(--text3);margin-top:12px;line-height:1.5';disc.textContent='Pricing, promotions, stock, delivery, and installation are subject to confirmation at time of quote.';c.appendChild(disc);
  return c;
}

function buildSuccess(){
  const c=mk('div','content');const s=mk('div','success-screen');
  const ico=mk('div','success-ico');ico.textContent='✓';
  ico.style.background='#E1F5EE';ico.style.color='#0F6E56';
  const title=mk('div','section-title');title.textContent='Profile saved!';
  const sub=mk('div','section-sub');sub.style.maxWidth='420px';
  sub.textContent=`Thanks, ${S.first_name}! Your appliance profile has been saved. We'll be in touch via ${(S.preferred_contact||'your preferred method').replace(/_/g,' ')} with personalised recommendations and a quote.`;
  const next=mk('div','');next.style.cssText='background:var(--bg2);border-radius:var(--radius);padding:16px 20px;font-size:13px;color:var(--text2);width:100%;max-width:400px;text-align:left';
  next.innerHTML='<div style="font-weight:500;margin-bottom:8px;color:var(--text)">What happens next</div><div style="margin-bottom:6px">1. We review your appliance preferences</div><div style="margin-bottom:6px">2. We match products to your needs and budget</div><div>3. You receive a personalised quote within 24–48 hours</div>';
  const b=mk('button','btn-cont');b.textContent='Start a new profile';b.style.marginTop='8px';
  b.addEventListener('click',()=>{Object.assign(S,{step:0,errors:{},submitted:false,submitError:false,first_name:'',last_name:'',email:'',phone:'',city:'',province:'',postal_code:'',preferred_contact:'',lead_source:'',project_type:'',occupancy_type:'',timeline:'',priority_primary:'',room_scope:[],selected_appliances:[],det:{},measurements_ready:'',delivery_stairs:'',delivery_remove_old:'',delivery_installation:'',budget_mode:'bundle',budget_range:'',appl_budgets:{},colour_preference:'',promo_interest:'',brand_flexible:'',open_box_ok:'',customer_notes:'',consent_contact:false,consent_summary:false});render();});
  [ico,title,sub,next,b].forEach(n=>s.appendChild(n));c.appendChild(s);return c;
}

render();
</script>
</body>
</html>
